<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Código Postal de Panamá - Mapa Interactivo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            height: 90vh; /* Ocupa casi todo el alto de la ventana */
        }

        .panel {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .map-panel {
            flex: 2; /* El mapa ocupa más espacio */
            position: relative;
        }

        #map {
            height: 100%;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .info-panel {
            flex: 1; /* El panel de info ocupa menos espacio */
            overflow-y: auto; /* Permite scroll si el contenido es mucho */
        }

        h2 { margin-top: 0; color: var(--primary); font-weight: 600; text-align: center; }
        
        .input-group { margin-bottom: 1.2rem; }
        
        label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 600; color: #64748b; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .coords-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            width: 100%;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-map { background: #64748b; }
        .btn-map:hover { background: #475569; }

        .btn-calc { background: var(--primary); }
        .btn-calc:hover { background: #1d4ed8; }

        .result-box {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: var(--accent);
            border-radius: 12px;
            text-align: center;
            border: 2px dashed #cbd5e1;
            display: none;
        }

        #postal-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--primary);
            display: block;
            margin-top: 0.5rem;
        }

        .footer {
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: center;
            margin-top: auto; /* Empuja el footer al final */
            padding-top: 20px;
        }

        /* Estilo para los polígonos del GeoJSON */
        .leaflet-interactive {
            stroke: #2563eb;
            stroke-width: 2;
            fill: #60a5fa;
            fill-opacity: 0.3;
            transition: fill-opacity 0.2s;
        }

        .leaflet-interactive:hover {
            fill-opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="panel map-panel">
        <div id="map"></div>
    </div>

    <div class="panel info-panel">
        <h2>Zona Postal</h2>
        
        <div class="input-group">
            <label>Código de Ubicación Seleccionado (VM_LEVEL)</label>
            <input type="text" id="vmLevel" placeholder="Haga clic en el mapa..." readonly>
        </div>

        <div class="coords-grid">
            <div class="input-group">
                <label>Latitud (A2)</label>
                <input type="number" id="lat" step="any" placeholder="8.9833">
            </div>
            <div class="input-group">
                <label>Longitud (B2)</label>
                <input type="number" id="lng" step="any" placeholder="-79.5167">
            </div>
        </div>

        <button class="btn-calc" onclick="generarCodigo()">TRANSFORMAR COORDENADAS</button>

        <div class="result-box" id="resultContainer">
            <label>CÓDIGO POSTAL RESULTANTE</label>
            <span id="postal-code">---</span>
        </div>

        <div class="footer">
            Diseñado por Raúl Víquez<br>
            Propiedad Intelectual Protegida<br>
            © COTEL Panamá
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    // --- Configuración del Mapa Leaflet ---
    // Inicializar el mapa centrado en Panamá
    const map = L.map('map').setView([8.98, -79.52], 12); // Coordenadas de Ciudad de Panamá, Zoom 12

    // Añadir capa base de OpenStreetMap
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    // Variable para guardar la capa del GeoJSON
    let geojsonLayer;

    // Función para manejar clics en los polígonos
    function onEachFeature(feature, layer) {
        layer.on({
            click: function(e) {
                // 1. Obtener el valor del campo VM_LEVEL
                const vmLevelValue = feature.properties.VM_LEVEL;
                
                // 2. Actualizar el input en el HTML
                document.getElementById('vmLevel').value = vmLevelValue;

                // 3. (Opcional) Obtener las coordenadas del clic y ponerlas en los inputs
                document.getElementById('lat').value = e.latlng.lat.toFixed(6);
                document.getElementById('lng').value = e.latlng.lng.toFixed(6);

                // 4. Resaltar visualmente el polígono cliqueado
                if (geojsonLayer) {
                    geojsonLayer.resetStyle(); // Resetea estilos anteriores
                }
                layer.setStyle({
                    fillColor: '#f59e0b', // Color ámbar al cliquear
                    fillOpacity: 0.7
                });

                // Ocultar resultado anterior si existe
                document.getElementById('resultContainer').style.display = 'none';
            }
        });
    }

    // Cargar el archivo GeoJSON
    fetch('estafetas.geojson')
        .then(response => {
            if (!response.ok) {
                throw new Error('No se pudo cargar estafetas.geojson. Asegúrate de ejecutar esto desde un servidor web local.');
            }
            return response.json();
        })
        .then(data => {
            // Crear la capa GeoJSON y añadirla al mapa
            geojsonLayer = L.geoJSON(data, {
                onEachFeature: onEachFeature,
                style: function(feature) {
                    return {
                        // Estilo por defecto definido en el CSS (.leaflet-interactive)
                    };
                }
            }).addTo(map);
        })
        .catch(error => {
            console.error('Error al cargar GeoJSON:', error);
            alert(error.message);
        });


    // --- Lógica del Sistema de Código Postal (Original de Raul Viquez) ---
    const originLat = 10.0;
    const originLng = -83.0;
    const resMacro = 0.143;
    const resPico = (((resMacro / 24) / 25) / 8);
    const MACRO_X_COUNT = 42;

    // Tabla de Datos VM_LEVEL -> VM_LEVEL2D
    const dataTable = {

        "B7042":"B2","B7099":"B3","B7113":"B4","B7115":"B5","B7117":"B6","B7121":"B7","B7199":"B8","B7231":"B9","B7241":"BA","B7299":"BB","B7321":"BC","B7399":"BD","B8899":"BE",
        "C7199":"C2","C8999":"C3","D8799":"D2","E6301":"E2","E6302":"E3","E6312":"E4","E6399":"E5","E8399":"E6","E8699":"E7",
        "F3023":"F2","F3099":"F3","F3105":"F4","F3107":"F5","F3109":"F6","F3199":"F7","F3201":"F8","F3208":"F9","F3213":"FA","F3217":"FB","F3230":"FC","F3299":"FD","F3303":"FE","F3304":"FF","F3319":"FG","F3399":"FH","F4299":"FJ","F8199":"FK","F8299":"FL",
        "G1299":"G2","G2599":"G3","G3199":"G4","G8199":"G5",
        "H1003":"H2","H1004":"H3","H1006":"H4","H1199":"H5","H1208":"H6","H1299":"H7","H1301":"H8","H139
