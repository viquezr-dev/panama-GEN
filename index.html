<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Código Postal de Panamá</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
        }

        h2 { margin-top: 0; color: var(--primary); font-weight: 600; text-align: center; }
        
        .input-group { margin-bottom: 1.2rem; }
        
        label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 600; color: #64748b; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .coords-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover { background: #1d4ed8; }

        .result-box {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: var(--accent);
            border-radius: 12px;
            text-align: center;
            border: 2px dashed #cbd5e1;
        }

        #postal-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--primary);
            display: block;
            margin-top: 0.5rem;
        }

        .footer {
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: center;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Generador de Código Postal</h2>
    
    <div class="input-group">
        <label>Código de Ubicación (VM_LEVEL)</label>
        <input type="text" id="vmLevel" placeholder="Ej: A5899" list="vmOptions">
        <datalist id="vmOptions">
            <option value="A5899">A5899</option>
            <option value="I2026">I2026</option>
            <option value="M5303">M5303</option>
        </datalist>
    </div>

    <div class="coords-grid">
        <div class="input-group">
            <label>Latitud (A2)</label>
            <input type="number" id="lat" step="any" placeholder="8.9833">
        </div>
        <div class="input-group">
            <label>Longitud (B2)</label>
            <input type="number" id="lng" step="any" placeholder="-79.5167">
        </div>
    </div>

    <button onclick="generarCodigo()">TRANSFORMAR COORDENADAS</button>

    <div class="result-box" id="resultContainer" style="display: none;">
        <label>CÓDIGO POSTAL RESULTANTE</label>
        <span id="postal-code">---</span>
    </div>

    <div class="footer">
        Diseñado por Raúl Víquez<br>
        Propiedad Intelectual Protegida
    </div>
</div>

<script>
    // --- Lógica del Sistema ---
    const originLat = 10.0;
    const originLng = -83.0;
    const resMacro = 0.143;
    const resPico = (((resMacro / 24) / 25) / 8);
    const MACRO_X_COUNT = 42;

    // Tabla de Datos VM_LEVEL -> VM_LEVEL2D
    const dataTable = {
        "A5899":"A2","A6000":"A3","A6099":"A4","A6123":"A5","A6130":"A6","A6132":"A7","A6133":"A8","A6134":"A9","A6135":"AA","A6143":"AB","A6199":"AC","A6215":"AD","A6216":"AE","A6218":"AF","A6219":"AG","A6224":"AH","A6238":"AJ","A6239":"AK","A6260":"AL","A6299":"AM","A6347":"AN","A6350":"AP","A6399":"AQ","A7307":"AR","A7399":"AS",
        "B7042":"B2","B7099":"B3","B7113":"B4","B7115":"B5","B7117":"B6","B7121":"B7","B7199":"B8","B7231":"B9","B7241":"BA","B7299":"BB","B7321":"BC","B7399":"BD","B8899":"BE",
        "C7199":"C2","C8999":"C3","D8799":"D2","E6301":"E2","E6302":"E3","E6312":"E4","E6399":"E5","E8399":"E6","E8699":"E7",
        "F3023":"F2","F3099":"F3","F3105":"F4","F3107":"F5","F3109":"F6","F3199":"F7","F3201":"F8","F3208":"F9","F3213":"FA","F3217":"FB","F3230":"FC","F3299":"FD","F3303":"FE","F3304":"FF","F3319":"FG","F3399":"FH","F4299":"FJ","F8199":"FK","F8299":"FL",
        "G1299":"G2","G2599":"G3","G3199":"G4","G8199":"G5",
        "H1003":"H2","H1004":"H3","H1006":"H4","H1199":"H5","H1208":"H6","H1299":"H7","H1301":"H8","H1399":"H9",
        "I2026":"I2","I2099":"I3","I2103":"I4","I2106":"I5","I2108":"I6","I2199":"I7","I2209":"I8","I2220":"I9","I2224":"IA","I2243":"IB","I2299":"IC","I2301":"ID","I2311":"IE","I2315":"IF","I2399":"IG","I2413":"IH","I2426":"IJ","I2432":"IK","I2436":"IL","I2499":"IM","I2538":"IN","I2540":"IP","I2544":"IQ","I2552":"IR","I2554":"IS","I2599":"IT",
        "J4101":"J2","J4110":"J3","J4122":"J4","J4139":"J5","J4140":"J6","J4144":"J7","J4149":"J8","J4154":"J9","J4158":"JA","J4166":"JB","J4199":"JC",
        "K4019":"K2","K4201":"K3","K4203":"K4","K4207":"K5","K4209":"K6","K4211":"K7","K4213":"K8","K4215":"K9","K4217":"KA","K4221":"KB","K4299":"KC",
        "L5029":"L2","L5101":"L3","L5103":"L4","L5105":"L5","L5109":"L6","L5121":"L7","L5199":"L8","L5212":"L9","L5216":"LA","L5223":"LB","L5225":"LC","L5231":"LD","L5299":"LE","L5311":"LF","L5313":"LG","L5399":"LH","L8499":"LJ",
        "M5303":"M2","M5305":"M3","M5307":"M4","M5311":"M5","M5313":"M6","M5315":"M7","M5317":"M8","M5399":"M9","M8599":"MA"
    };

    function encodeJS(num, longitud) {
        const alfa = "23456789ABCDEFGHJKLMNPQRSTVWXZ";
        let s = "";
        let n = Math.abs(Math.floor(num));
        for (let i = 0; i < longitud; i++) {
            s = alfa.charAt(n % 30) + s;
            n = Math.floor(n / 30);
        }
        return s;
    }

    function generarCodigo() {
        const lat = parseFloat(document.getElementById('lat').value);
        const lng = parseFloat(document.getElementById('lng').value);
        const vmLevel = document.getElementById('vmLevel').value.toUpperCase().trim();

        if (isNaN(lat) || isNaN(lng)) {
            alert("Error: Ingrese coordenadas válidas.");
            return;
        }

        // Búsqueda del prefijo (VLookup)
        const prefijo = dataTable[vmLevel] || "??";

        // Cálculos de cuadrícula (Lógica original de Raul Viquez)
        const totalPicoX = Math.floor(((lng - originLng) / resPico) + 0.00001);
        const totalPicoY = Math.floor(((originLat - lat) / resPico) + 0.00001);

        const totalNanoX = Math.floor(totalPicoX / 8);
        const totalNanoY = Math.floor(totalPicoY / 8);

        const mx = Math.floor(totalNanoX / 600);
        const my = Math.floor(totalNanoY / 600);

        const microX = Math.floor((totalNanoX % 600) / 25);
        const microY = Math.floor((totalNanoY % 600) / 25);

        const nanoX = totalNanoX % 25;
        const nanoY = totalNanoY % 25;

        const picoX = totalPicoX % 8;
        const picoY = totalPicoY % 8;

        // Formateo alfanumérico
        const macroStr = encodeJS((my * MACRO_X_COUNT) + mx, 2);
        const microStr = encodeJS((microY * 24) + microX, 2);
        const nanoStr = encodeJS((nanoY * 25) + nanoX, 2);
        const picoStr = encodeJS((picoY * 8) + picoX, 2);

        let codigoCompleto = prefijo + macroStr + microStr + nanoStr + picoStr;
        
        // Aplicar guion después del 5to carácter
        let finalFormat = codigoCompleto;
        if (codigoCompleto.length >= 5) {
            finalFormat = codigoCompleto.substring(0, 5) + "-" + codigoCompleto.substring(5);
        }

        // Mostrar resultado
        document.getElementById('postal-code').innerText = finalFormat;
        document.getElementById('resultContainer').style.display = 'block';
    }
</script>

</body>
</html>
