<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SISTEMA POSTAL PANAMÁ </title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --panel-bg: #ffffff;
            --text-main: #334155;
            --text-light: #94a3b8;
            --accent-soft: #0ea5e9;
            --warning: #f59e0b;
            --danger: #e11d48;
            --bg-body: #f1f5f9;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-body); overflow: hidden; }
        .main-layout { display: flex; height: 100vh; width: 100vw; flex-direction: row; }

        .info-panel {
            width: 360px;
            background: var(--panel-bg);
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow-y: auto;
        }

        #map { flex-grow: 1; height: 100%; background: #e5e7eb; }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column-reverse; }
            .info-panel { width: 100%; height: 45%; padding: 15px; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); }
            .instruction-box { display: none; }
            h2 { font-size: 0.9rem; margin-bottom: 10px; }
            .input-group { margin-bottom: 10px; }
            #postal-code-panel { font-size: 1.5rem; }
        }

        .instruction-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            color: var(--text-main);
            line-height: 1.5;
        }
        .instruction-box b { color: var(--accent-soft); }

        h2 { color: var(--text-main); font-size: 1rem; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; border-left: 4px solid var(--accent-soft); padding-left: 10px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-light); margin-bottom: 8px; text-transform: uppercase; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
            background: #fcfcfc;
            color: var(--text-main);
            box-sizing: border-box;
        }

        .result-box {
            margin-top: auto;
            padding: 20px;
            background: #f8fafc;
            border: 1px dashed var(--accent-soft);
            border-radius: 12px;
            text-align: center;
        }

        #postal-code-panel {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 5px;
            color: var(--text-main);
        }

        .leaflet-popup-content-wrapper { border-radius: 8px; }
        .popup-container { text-align: center; padding: 5px; }
        .popup-tag { font-size: 10px; color: var(--text-light); text-transform: uppercase; font-weight: 700; }
        .popup-code { font-size: 18px; font-weight: 700; color: var(--accent-soft); font-family: 'JetBrains Mono'; margin: 5px 0; }
        .popup-zona { font-size: 14px; font-weight: 600; color: var(--warning); }
        
        .popup-externo { color: var(--danger); padding: 10px; text-align: center; }
        .popup-externo b { display: block; font-size: 13px; margin-bottom: 4px; }

        /* Estilo para el botón de estafeta cercana en el popup */
        .btn-near {
            background: var(--accent-soft);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            text-transform: uppercase;
        }

        .footer { text-align: center; font-size: 0.7rem; color: var(--text-light); padding-top: 20px; }
        .zoom-warning { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; background: rgba(245, 158, 11, 0.9); color: white; padding: 10px 20px; border-radius: 20px; font-weight: 600; display: none; pointer-events: none; }
        .gps-btn { background: white; width: 34px; height: 34px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    </style>
</head>
<body>

<div id="zoom-alert" class="zoom-warning">⚠️ Acerque más el mapa para ver las viviendas</div>

<div class="main-layout">
    <div class="info-panel">
        <h2>Generador de Códigos postales</h2>
        <div class="instruction-box">
            <b>Instrucciones:</b><br>
            1. Haga clic en un punto conocido.<br>
            2. El área en <span style="color:var(--warning); font-weight:700">amarillo</span> es la zona postal.<br>
            3. El código obtenido es el <b>Código Postal</b>.
        </div>
        <div class="input-group">
            <label>Zona Postal (COTEL)</label>
            <input type="text" id="vmLevel" placeholder="Esperando selección..." readonly>
        </div>
        <div class="input-group">
            <label>Coordenadas (Lat, Lng)</label>
            <input type="text" id="coordsInput" placeholder="---, ---" readonly>
        </div>
        <div class="result-box">
            <label>CÓDIGO POSTAL</label>
            <span id="postal-code-panel">---</span>
        </div>
        <div class="footer">
            Diseñado por Raúl Víquez<br>
            Propiedad Intelectual Protegida<br>
            © Para COTEL Panamá
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const TABLA_BUSQUEDA = { "A5899":"A2","A6000":"A3","A6099":"A4","A6123":"A5","A6130":"A6","A6132":"A7","A6133":"A8","A6134":"A9","A6135":"AA","A6143":"AB","A6199":"AC","A6215":"AD","A6216":"AE","A6218":"AF","A6219":"AG","A6224":"AH","A6238":"AJ","A6239":"AK","A6260":"AL","A6299":"AM","A6347":"AN","A6350":"AP","A6399":"AQ","A7307":"AR","A7399":"AS","B7042":"B2","B7099":"B3","B7113":"B4","B7115":"B5","B7117":"B6","B7121":"B7","B7199":"B8","B7231":"B9","B7241":"BA","B7299":"BB","B7321":"BC","B7399":"BD","B8899":"BE","C7199":"C2","C8999":"C3","D8799":"D2","E6301":"E2","E6302":"E3","E6312":"E4","E6399":"E5","E8399":"E6","E8699":"E7","F3023":"F2","F3099":"F3","F3105":"F4","F3107":"F5","F3109":"F6","F3199":"F7","F3201":"F8","F3208":"F9","F3213":"FA","F3217":"FB","F3230":"FC","F3299":"FD","F3303":"FE","F3304":"FF","F3319":"FG","F3399":"FH","F4299":"FJ","F8199":"FK","F8299":"FL","G1299":"G2","G2599":"G3","G3199":"G4","G8199":"G5","H1003":"H2","H1004":"H3","H1006":"H4","H1199":"H5","H1208":"H6","H1299":"H7","H1301":"H8","H1399":"H9","I2026":"I2","I2099":"I3","I2103":"I4","I2106":"I5","I2108":"I6","I2199":"I7","I2209":"I8","I2220":"I9","I2224":"IA","I2243":"IB","I2299":"IC","I2301":"ID","I2311":"IE","I2315":"IF","I2399":"IG","I2413":"IH","I2426":"IJ","I2432":"IK","I2436":"IL","I2499":"IM","I2538":"IN","I2540":"IP","I2544":"IQ","I2552":"IR","I2554":"IS","I2599":"IT","J4101":"J2","J4110":"J3","J4122":"J4","J4139":"J5","J4140":"J6","J4144":"J7","J4149":"J8","J4154":"J9","J4158":"JA","J4166":"JB","J4199":"JC","K4019":"K2","K4201":"K3","K4203":"K4","K4207":"K5","K4209":"K6","K4211":"K7","K4213":"K8","K4215":"K9","K4217":"KA","K4221":"KB","K4299":"KC","L5029":"L2","L5101":"L3","L5103":"L4","L5105":"L5","L5109":"L6","L5121":"L7","L5199":"L8","L5212":"L9","L5216":"LA","L5223":"LB","L5225":"LC","L5231":"LD","L5299":"LE","L5311":"LF","L5313":"LG","L5399":"LH","L8499":"LJ","M5303":"M2","M5305":"M3","M5307":"M4","M5311":"M5","M5313":"M6","M5315":"M7","M5317":"M8","M5399":"M9","M8599":"MA" };
const ORIGIN = { lat: 10.0, lng: -83.0 };
const PARAMS = { RES_PICO: ((0.143/24)/25)/8, ALFA: "23456789ABCDEFGHJKLMNPQRSTVWXZ", MACRO_X_COUNT: 42 };

const mapaSatelite = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20 });
const map = L.map('map', { zoomControl: false, layers: [mapaSatelite] }).setView([8.98, -79.52], 12);
L.control.zoom({ position: 'bottomright' }).addTo(map);

// Capas de datos
let layerZonas = L.geoJSON(null, { style: { color: "#f59e0b", weight: 2, fillOpacity: 0.05 } }).addTo(map);
let markerLayer = L.layerGroup().addTo(map);
let estafetasPoints = L.layerGroup().addTo(map);
let lineasCercanas = L.layerGroup().addTo(map); // Para la línea punteada

// Cargar Estafetas Polígonos
fetch('estafetas.geojson').then(r => r.json()).then(data => layerZonas.addData(data));

// Cargar Estafetas Puntos (estafetasp.geojson)
fetch('estafetasp.geojson').then(r => r.json()).then(data => {
    estafetasData = data.features;
    L.geoJSON(data, {
        pointToLayer: (latlng) => {
            return L.circleMarker(latlng, {
                radius: 7,
                fillColor: "#e11d48",
                color: "#fff",
                weight: 2,
                fillOpacity: 0.8
            });
        },
        onEachFeature: (feature, layer) => {
            const props = feature.properties;
            const content = `
                <div style="text-align:center; min-width:120px;">
                    <b style="color:#e11d48; font-size:13px;">${props.ESTAF_NAME}</b><br>
                    <small>Código: ${props.ESTAF_CODE}</small><br>
                    <small>Ruta: ${props.RUTA || 'N/A'}</small>
                </div>
            `;

            // Vincular el popup pero configurarlo para que sea sutil
            layer.bindPopup(content, { 
                closeButton: false, 
                offset: L.point(0, -7),
                className: 'estafeta-hover-popup'
            });

            // EVENTO: Al pasar el mouse por encima (Hover)
            layer.on('mouseover', function (e) {
                this.openPopup();
                this.setStyle({ fillOpacity: 1, radius: 9 }); // Efecto visual de resaltado
            });

            // EVENTO: Al quitar el mouse
            layer.on('mouseout', function (e) {
                this.closePopup();
                this.setStyle({ fillOpacity: 0.8, radius: 7 }); // Regresa a la normalidad
            });

            // EVENTO: Si haces clic (por si quieres que la línea punteada también funcione desde la estafeta)
            layer.on('click', function(e) {
                L.DomEvent.stopPropagation(e);
                // Aquí podrías disparar otra acción si quisieras
            });
        }
    }).addTo(estafetasPoints);
});

// Función de distancia (Haversine)
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; // Radio Tierra km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Botón GPS
const GpsControl = L.Control.extend({
    onAdd: function(map) {
        let btn = L.DomUtil.create('button', 'gps-btn');
        btn.innerHTML = '📍';
        btn.onclick = () => map.locate({setView: true, maxZoom: 17, watch: true});
        return btn;
    }
});
new GpsControl({position: 'bottomright'}).addTo(map);

map.on('zoomend', function() {
    document.getElementById('zoom-alert').style.display = (map.getZoom() < 17) ? 'block' : 'none';
});

function encodeJS(num, len) {
    let s = ""; let n = Math.abs(Math.floor(num));
    for (let i = 0; i < len; i++) { s = PARAMS.ALFA[n % 30] + s; n = Math.floor(n / 30); }
    return s;
}

function getGridInfo(lat, lng) {
    const tpX = Math.floor(((lng - ORIGIN.lng) / PARAMS.RES_PICO) + 0.00001);
    const tpY = Math.floor(((ORIGIN.lat - lat) / PARAMS.RES_PICO) + 0.00001);
    const tnX = Math.floor(tpX / 8), tnY = Math.floor(tpY / 8);
    return { 
        macro: encodeJS((Math.floor(tnY / 600) * 42) + Math.floor(tnX / 600), 2), 
        micro: encodeJS((Math.floor((tnY % 600) / 25) * 24) + Math.floor((tnX % 600) / 25), 2), 
        nano: encodeJS(((tnY % 25) * 25) + (tnX % 25), 2), 
        pico: encodeJS(((tpY % 8) * 8) + (tpX % 8), 2) 
    };
}

function pointInPolygon(point, vs) {
    let x = point[0], y = point[1], inside = false;
    for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
        let xi = vs[i][0], yi = vs[i][1], xj = vs[j][0], yj = vs[j][1];
        if (((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
    }
    return inside;
}

let userMarker = null;

map.on('locationfound', function(e) {
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.circleMarker(e.latlng, { radius: 8, fillColor: "#0ea5e9", color: "#ffffff", weight: 3, opacity: 1, fillOpacity: 1 }).addTo(map);
});

function removerUbicacion() {
    if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
    lineasCercanas.clearLayers();
}

// Función para encontrar estafeta más cercana
function buscarEstafetaCercana(lat, lng) {
    let minDest = Infinity;
    let estafetaCercana = null;

    estafetasData.forEach(f => {
        let d = getDistance(lat, lng, f.geometry.coordinates[1], f.geometry.coordinates[0]);
        if (d < minDest) {
            minDest = d;
            estafetaCercana = f;
        }
    });

    if (estafetaCercana) {
        lineasCercanas.clearLayers();
        let estCoord = [estafetaCercana.geometry.coordinates[1], estafetaCercana.geometry.coordinates[0]];
        
        // Dibujar línea punteada
        L.polyline([[lat, lng], estCoord], {
            color: '#e11d48',
            weight: 2,
            dashArray: '5, 10',
            opacity: 0.8
        }).addTo(lineasCercanas);

        L.popup()
            .setLatLng(estCoord)
            .setContent(`<b>${estafetaCercana.properties.ESTAF_NAME}</b><br>Distancia: ${minDest.toFixed(2)} km`)
            .openOn(map);
    }
}

map.on('click', function(e) {
    removerUbicacion();
    if (map.getZoom() < 17) return;

    let encontrada = null;
    layerZonas.eachLayer(layer => {
        const pt = [e.latlng.lng, e.latlng.lat];
        const geom = layer.feature.geometry;
        if (geom.type === "Polygon") {
            if (pointInPolygon(pt, geom.coordinates[0])) encontrada = layer.feature.properties;
        } else {
            geom.coordinates.forEach(poly => { if (pointInPolygon(pt, poly[0])) encontrada = layer.feature.properties; });
        }
    });

    markerLayer.clearLayers();

    if (!encontrada) {
        L.popup().setLatLng(e.latlng).setContent('<div class="popup-externo">⚠️ <b>ÁREA NO CONOCIDA</b><small>Fuera de zona postal</small></div>').openOn(map);
        document.getElementById('vmLevel').value = "DESCONOCIDO";
        document.getElementById('postal-code-panel').innerText = "---";
        return;
    }

    const res = getGridInfo(e.latlng.lat, e.latlng.lng);
    const zonaID = encontrada.VM_LEVEL2D || TABLA_BUSQUEDA[encontrada.VM_LEVEL] || "XX";
    const fullCode = zonaID + res.macro + res.micro + res.nano + res.pico;
    const formatted = fullCode.substring(0, 5) + "-" + fullCode.substring(5);

    document.getElementById('vmLevel').value = encontrada.VM_LEVEL;
    document.getElementById('coordsInput').value = `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
    document.getElementById('postal-code-panel').innerText = formatted;

    L.circleMarker(e.latlng, { radius: 6, fillColor: "#0ea5e9", color: "#fff", weight: 2, fillOpacity: 1 }).addTo(markerLayer);
    
    // Popup con botón de estafeta cercana
    L.popup({ offset: [0, -5] }).setLatLng(e.latlng).setContent(`
        <div class="popup-container">
            <span class="popup-tag">Código Postal</span>
            <div class="popup-code">${formatted}</div>
            <span class="popup-tag">Zona</span>
            <div class="popup-zona">${encontrada.VM_LEVEL}</div>
            <button class="btn-near" onclick="buscarEstafetaCercana(${e.latlng.lat}, ${e.latlng.lng})">Estafeta más cercana</button>
        </div>
    `).openOn(map);
});
</script>
</body>
</html>
