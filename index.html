<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA POSTAL PANAMÁ - Generador de Código</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1a2a6c;
            --accent: #f1c40f;
            --bg: #f1f5f9;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); }
        
        .main-layout { display: flex; height: 100vh; width: 100vw; overflow: hidden; }

        /* Panel Lateral */
        .info-panel {
            width: 400px;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        /* Mapa */
        #map { flex-grow: 1; height: 100%; }

        h2 { color: var(--primary); font-size: 1.2rem; text-align: center; margin-bottom: 20px; text-transform: uppercase; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            background: #f8fafc;
        }

        .coords-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            text-align: center;
            border: 3px solid var(--accent);
        }

        #postal-code {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 900;
            margin-top: 10px;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .footer {
            margin-top: auto;
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            padding-top: 20px;
        }

        /* Estilos del Popup */
        .leaflet-popup-content-wrapper { border-radius: 8px; font-size: 12px; }
        .popup-title { font-weight: bold; color: var(--primary); border-bottom: 1px solid #ddd; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="info-panel">
        <h2>Generador Postal</h2>
        
        <div class="input-group">
            <label>Zona Postal (VM_LEVEL)</label>
            <input type="text" id="vmLevel" placeholder="Clic en el mapa..." readonly>
        </div>

        <div class="coords-grid">
            <div class="input-group">
                <label>Latitud</label>
                <input type="text" id="lat" readonly>
            </div>
            <div class="input-group">
                <label>Longitud</label>
                <input type="text" id="lng" readonly>
            </div>
        </div>

        <div class="result-box">
            <label style="color: rgba(255,255,255,0.7)">CÓDIGO POSTAL RESULTANTE</label>
            <span id="postal-code">---</span>
            <div id="extra-info" style="font-size: 0.8rem; margin-top: 10px; color: #cbd5e1;"></div>
        </div>

        <div class="footer">
            Propiedad Intelectual: Raúl Víquez<br>
            COTEL Panamá - 2026
        </div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// --- TABLA DE BÚSQUEDA (VLookup) ---
const TABLA_BUSQUEDA = {
    "A5899":"A2","A6000":"A3","A6099":"A4","A6123":"A5","A6130":"A6","A6132":"A7","A6133":"A8","A6134":"A9","A6135":"AA","A6143":"AB","A6199":"AC","A6215":"AD","A6216":"AE","A6218":"AF","A6219":"AG","A6224":"AH","A6238":"AJ","A6239":"AK","A6260":"AL","A6299":"AM","A6347":"AN","A6350":"AP","A6399":"AQ","A7307":"AR","A7399":"AS",
    "B7042":"B2","B7099":"B3","B7113":"B4","B7115":"B5","B7117":"B6","B7121":"B7","B7199":"B8","B7231":"B9","B7241":"BA","B7299":"BB","B7321":"BC","B7399":"BD","B8899":"BE",
    "C7199":"C2","C8999":"C3","D8799":"D2","E6301":"E2","E6302":"E3","E6312":"E4","E6399":"E5","E8399":"E6","E8699":"E7",
    "F3023":"F2","F3099":"F3","F3105":"F4","F3107":"F5","F3109":"F6","F3199":"F7","F3201":"F8","F3208":"F9","F3213":"FA","F3217":"FB","F3230":"FC","F3299":"FD","F3303":"FE","F3304":"FF","F3319":"FG","F3399":"FH","F4299":"FJ","F8199":"FK","F8299":"FL",
    "G1299":"G2","G2599":"G3","G3199":"G4","G8199":"G5",
    "H1003":"H2","H1004":"H3","H1006":"H4","H1199":"H5","H1208":"H6","H1299":"H7","H1301":"H8","H1399":"H9",
    "I2026":"I2","I2099":"I3","I2103":"I4","I2106":"I5","I2108":"I6","I2199":"I7","I2209":"I8","I2220":"I9","I2224":"IA","I2243":"IB","I2299":"IC","I2301":"ID","I2311":"IE","I2315":"IF","I2399":"IG","I2413":"IH","I2426":"IJ","I2432":"IK","I2436":"IL","I2499":"IM","I2538":"IN","I2540":"IP","I2544":"IQ","I2552":"IR","I2554":"IS","I2599":"IT",
    "J4101":"J2","J4110":"J3","J4122":"J4","J4139":"J5","J4140":"J6","J4144":"J7","J4149":"J8","J4154":"J9","J4158":"JA","J4166":"JB","J4199":"JC",
    "K4019":"K2","K4201":"K3","K4203":"K4","K4207":"K5","K4209":"K6","K4211":"K7","K4213":"K8","K4215":"K9","K4217":"KA","K4221":"KB","K4299":"KC",
    "L5029":"L2","L5101":"L3","L5103":"L4","L5105":"L5","L5109":"L6","L5121":"L7","L5199":"L8","L5212":"L9","L5216":"LA","L5223":"LB","L5225":"LC","L5231":"LD","L5299":"LE","L5311":"LF","L5313":"LG","L5399":"LH","L8499":"LJ",
    "M5303":"M2","M5305":"M3","M5307":"M4","M5311":"M5","M5313":"M6","M5315":"M7","M5317":"M8","M5399":"M9","M8599":"MA"
};

// --- CONSTANTES LÓGICA VÍQUEZ ---
const ORIGIN = { lat: 10.0, lng: -83.0 };
const PARAMS = {
    RES_MACRO: 0.143, 
    RES_PICO: ((0.143/24)/25)/8, 
    ALFA: "23456789ABCDEFGHJKLMNPQRSTVWXZ", 
    MACRO_X_COUNT: 42
};

// --- INICIALIZACIÓN MAPA ---
const map = L.map('map', { zoomControl: false }).setView([8.98, -79.52], 12);
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let layerZonas = L.geoJSON(null, {
    style: { color: "#1a2a6c", weight: 1, fillOpacity: 0.1, fillColor: "#3498db" }
}).addTo(map);

// Marcador para el punto seleccionado
let selectionMarker = L.layerGroup().addTo(map);

// --- CARGA DE DATOS ---
fetch('estafetas.geojson')
    .then(r => r.json())
    .then(data => layerZonas.addData(data))
    .catch(e => console.error("Error cargando polígonos:", e));

// --- FUNCIONES CORE ---

function encodeJS(num, len) {
    let s = ""; let n = Math.abs(Math.floor(num));
    for (let i = 0; i < len; i++) { s = PARAMS.ALFA[n % 30] + s; n = Math.floor(n / 30); }
    return s;
}

function getGridInfo(lat, lng) {
    const totalPicoX = Math.floor(((lng - ORIGIN.lng) / PARAMS.RES_PICO) + 0.00001);
    const totalPicoY = Math.floor(((ORIGIN.lat - lat) / PARAMS.RES_PICO) + 0.00001);
    const totalNanoX = Math.floor(totalPicoX / 8);
    const totalNanoY = Math.floor(totalPicoY / 8);

    const mx = Math.floor(totalNanoX / 600);
    const my = Math.floor(totalNanoY / 600);
    const microX = Math.floor((totalNanoX % 600) / 25);
    const microY = Math.floor((totalNanoY % 600) / 25);
    const nanoX = totalNanoX % 25;
    const nanoY = totalNanoY % 25;
    const picoX = totalPicoX % 8;
    const picoY = totalPicoY % 8;

    return {
        macro: encodeJS((my * PARAMS.MACRO_X_COUNT) + mx, 2),
        micro: encodeJS((microY * 24) + microX, 2),
        nano: encodeJS((nanoY * 25) + nanoX, 2),
        pico: encodeJS((picoY * 8) + picoX, 2)
    };
}

// Función para detectar si un punto está dentro de un polígono (Ray Casting)
function pointInPolygon(point, vs) {
    let x = point[0], y = point[1];
    let inside = false;
    for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
        let xi = vs[i][0], yi = vs[i][1];
        let xj = vs[j][0], yj = vs[j][1];
        let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
    }
    return inside;
}

function identificarZona(latlng) {
    let zonaEncontrada = null;
    layerZonas.eachLayer(layer => {
        const feature = layer.feature;
        const pt = [latlng.lng, latlng.lat];
        
        if (feature.geometry.type === "Polygon") {
            if (pointInPolygon(pt, feature.geometry.coordinates[0])) zonaEncontrada = feature.properties;
        } else if (feature.geometry.type === "MultiPolygon") {
            feature.geometry.coordinates.forEach(poly => {
                if (pointInPolygon(pt, poly[0])) zonaEncontrada = feature.properties;
            });
        }
    });
    return zonaEncontrada;
}

function procesarClic(e) {
    const lat = e.latlng.lat;
    const lng = e.latlng.lng;
    
    // 1. Identificar zona en el GeoJSON
    const props = identificarZona(e.latlng);
    
    if (!props) {
        alert("Punto fuera de las zonas postales.");
        return;
    }

    // 2. Actualizar Interfaz
    const vmName = props.VM_LEVEL || "DESCONOCIDO";
    document.getElementById('vmLevel').value = vmName;
    document.getElementById('lat').value = lat.toFixed(6);
    document.getElementById('lng').value = lng.toFixed(6);

    // 3. Obtener prefijo de 2 dígitos (VLookup)
    const zonaID = props.VM_LEVEL2D || TABLA_BUSQUEDA[vmName] || "XX";

    // 4. Snap to Grid & Cálculo Postal
    const step = PARAMS.RES_PICO;
    const xGrid = Math.floor(((lng - ORIGIN.lng) / step) + 0.00001);
    const yGrid = Math.floor(((ORIGIN.lat - lat) / step) + 0.00001);
    const centerLat = ORIGIN.lat - (yGrid * step) - (step / 2);
    const centerLng = ORIGIN.lng + (xGrid * step) + (step / 2);

    const res = getGridInfo(centerLat, centerLng);
    const fullCode = zonaID + res.macro + res.micro + res.nano + res.pico;
    const formattedCode = fullCode.substring(0, 5) + "-" + fullCode.substring(5);

    // 5. Mostrar Resultados
    document.getElementById('postal-code').innerText = formattedCode;
    document.getElementById('extra-info').innerHTML = `
        Estafeta: ${props.ESTAF_NAME || 'N/A'}<br>
        Provincia: ${props.PROV_NOMB || 'N/A'}
    `;

    // 6. Marcador visual
    selectionMarker.clearLayers();
    L.marker([centerLat, centerLng]).addTo(selectionMarker)
        .bindPopup(`<b>${formattedCode}</b><br>${vmName}`).openPopup();
}

// Evento de clic
map.on('click', procesarClic);

</script>
</body>
</html>
